<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<section class="container">
    <h1>Dashboard</h1>
    
    <div th:if="${error}" class="error" th:text="${error}"></div>
    
    <form th:action="@{/setBudgetLimit}" method="post" class="form" style="margin-bottom: 1rem;">
        <label>Total Budget Limit:</label>
        <input type="number"
               name="totalBudget"
               step="0.01"
               th:value="${totalBudget}"
               placeholder="Enter total budget (e.g. 2000.00)"
               required>
        <button type="submit" class="btn">Set Limit</button>
    </form>

    <form th:action="@{/saveBudget}" th:object="${specimen}" method="post" class="form">
        <input type="hidden" th:field="*{budgetId}" />

        <label>Name:</label>
        <input type="text" th:field="*{budgetName}" placeholder="Enter budget name" required>

        <label>Description:</label>
        <input type="text" th:field="*{description}" placeholder="Describe your budget" required>

        <label>Category:</label>
        <input type="text" th:field="*{category}" placeholder="Category (e.g. Travel, Rent)" required>

        <label>Amount:</label>
        <input type="number" th:field="*{amount}" placeholder="Enter amount" required>

        <label>Start Date:</label>
        <input type="date" th:field="*{startDate}">

        <label>End Date:</label>
        <input type="date" th:field="*{endDate}">

        <button type="submit" class="btn">Save Budget</button>
        <label>
        <input type="checkbox" name="override" />
            Allow override if allocation is less than already spent
        </label>
    </form>
    <h2>Summary</h2>
    <p>
        Total Budget: <span th:text="${summary.totalBudget}"></span><br/>
        Total Spent: <span th:text="${summary.totalSpent}"></span><br/>
        Overall Remaining: <span th:text="${summary.totalRemaining}"></span>
    </p>
    <h2>Saved Budgets</h2>
    <table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Start</th>
        <th>End</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="b : ${budgets}">
        <td th:text="${b.budgetId}"></td>
        <td th:text="${b.budgetName}"></td>
        <td th:text="${b.description}"></td>
        <td th:text="${b.category}"></td>
        <td th:text="${b.amount}"></td>
        <td th:text="${b.startDate}"></td>
        <td th:text="${b.endDate}"></td>
        <td>
                <a th:href="@{|/budget/${b.budgetId}/edit|}" class="btn btn-sm btn-secondary">
                    Edit
                </a>
                <form th:action="@{|/budget/${b.budgetId}/delete|}" method="post"
                      style="display:inline-block; margin-left:4px;">
                    <button type="submit" class="btn btn-sm btn-danger">
                        Delete
                    </button>
                </form>
            </td>
    </tr>
    </tbody>
</table>
</section>

</body>
</html>
