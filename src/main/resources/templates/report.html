<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Financial Report</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<section class="container">
    <h1>Financial Report</h1>

    <p>Here’s an overview of your saved budgets.</p>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Start</th>
            <th>End</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${budgets}">
            <td th:text="${b.budgetId}"></td>
            <td th:text="${b.budgetName}"></td>
            <td th:text="${b.description}"></td>
            <td th:text="${b.category}"></td>
            <td th:text="${b.amount}"></td>
            <td th:text="${b.startDate}"></td>
            <td th:text="${b.endDate}"></td>
        </tr>
        </tbody>
    </table>

    <h2>Budget Allocation (Pie Chart)</h2>
    <table>
        <h2>Summary</h2>
        <p>
            Total Budget: <span th:text="${summary.totalBudget}"></span><br/>
            Total Allocated: <span th:text="${summary.totalAllocated}"></span><br/>
            Overall Remaining: <span th:text="${summary.totalRemaining}"></span>
        </p>
        <canvas id="allocationPie" width="100" height="100"></canvas>
    </table>
    <h2>Category Breakdown</h2>
    <table>
        <thead>
        <tr>
            <th>Category</th>
            <th>Budget</th>
            <th>Allocated</th>
            <th>Remaining</th>
            <th>% of Total Budget</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${summary.categories}">
            <td th:text="${c.category}"></td>
            <td th:text="${c.budget}"></td>
            <td th:text="${c.Allocated}"></td>
            <td th:text="${c.remaining}"></td>
            <td th:text="${c.shareOfTotal} + '%'"></td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn">Back to Dashboard</a>
</section>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Thymeleaf + JS to build the pie chart -->
<script th:inline="javascript">
/*<![CDATA[*/
    // Build labels from summary.categories
    var categoryLabels = [
    /*[# th:each="c : ${summary.categories}"]*/
        /*[[${c.category}]]*/,
    /*[/]*/
    ];

    // Use shareOfTotal as the slice size (percentage)
    var categoryData = [
    /*[# th:each="c : ${summary.categories}"]*/
        /*[[${c.shareOfTotal}]]*/,
    /*[/]*/
    ];

    var totalBudget = /*[[${summary.totalBudget}]]*/ 0;

    var ctx = document.getElementById('allocationPie').getContext('2d');
    var allocationPie = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: categoryLabels,
            datasets: [{
                data: categoryData
                // Chart.js will pick default colors
            }]
        },
        options: {
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            var label = context.label || '';
                            var value = context.raw || 0;
                            return label + ': ' + value.toFixed(1) + '%';
                        }
                    }
                },
                legend: {
                    position: 'bottom'
                },
                title: {
                    display: true,
                    text: 'Allocation as % of Total Budget (' + totalBudget + ')'
                }
            }
        }
    });
/*]]>*/
</script>

</body>
</html>
