<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Monthly Spending</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
    <body>
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <section class="container">
            <h1>Monthly Spending</h1>

            <!-- Month selector -->
            <form th:action="@{/monthly-spending}" method="get" class="form">
                <label for="month">Select month:</label>
                <input type="month"
                    id="month"
                    name="month"
                    th:value="${selectedMonth}">
                <button type="submit" class="btn">Load</button>
            </form>

            <h2 th:text="${monthLabel}">This Month</h2>

            <p>
                Total Spent This Month:
                <span id="totalSpentDisplay">0.00</span>
            </p>

            <!-- SAVING FORM -->
            <form th:action="@{/monthly-spending}" th:object="${form}" method="post">

                <input type="hidden" name="month" th:value="${selectedMonth}" />

                <table>
                    <thead>
                    <tr>
                        <th>Category</th>
                        <th>Total Category Budget</th>
                        <th>Amount Spent This Month</th>
                        <th>Remaining</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, iterStat : *{rows}">
                        <!-- Category -->
                        <td>
                            <span th:text="${row.category}">Category</span>
                            <input type="hidden"
                                th:name="'rows['+${iterStat.index}+'].category'"
                                th:value="${row.category}" />
                        </td>

                        <!-- Budget -->
                        <td th:attr="data-budget=${row.budget}">
                            <span th:text="${row.budget}">0.00</span>
                            <input type="hidden"
                                th:name="'rows['+${iterStat.index}+'].budget'"
                                th:value="${row.budget}" />
                        </td>

                        <!-- Spent -->
                        <td>
                            <input type="number"
                                step="0.01"
                                min="0"
                                class="spent-input"
                                th:name="'rows['+${iterStat.index}+'].spent'"
                                th:value="${row.spent}"
                                placeholder="Enter spent amount" />
                        </td>

                        <!-- Remaining -->
                        <td class="remaining-cell">0.00</td>
                    </tr>
                    </tbody>
                </table>

                <button type="submit" class="btn">Save Monthly Spending</button>
            </form>

            <a href="/dashboard" class="btn">Back to Dashboard</a>
        </section>

        <script>
            function recalc() {
                let totalSpent = 0.0;

                document.querySelectorAll("tbody tr").forEach(row => {
                    const budget = parseFloat(row.querySelector("td[data-budget]").dataset.budget) || 0;
                    const spent = parseFloat(row.querySelector("input.spent-input").value) || 0;

                    const remaining = budget - spent;
                    row.querySelector(".remaining-cell").textContent = remaining.toFixed(2);

                    totalSpent += spent;
                });

                document.getElementById("totalSpentDisplay").textContent = totalSpent.toFixed(2);
            }

            document.addEventListener("DOMContentLoaded", () => {
                document.querySelectorAll(".spent-input").forEach(inp => {
                    inp.addEventListener("input", recalc);
                });
                recalc();
            });
        </script>

    </body>
</html>
