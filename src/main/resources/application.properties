spring.application.name=financialmanagespring
server.port=8081
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/update tables from your @Entity classes when you add them
spring.jpa.hibernate.ddl-auto=update

# Show SQL in logs (helpful while learning/debugging)
spring.jpa.show-sql=true

# Optional: access H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.profiles.active=stub